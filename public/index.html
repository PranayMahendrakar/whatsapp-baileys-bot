<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WhatsApp Web UI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0b141a;color:#e9edef;height:100vh;display:flex;overflow:hidden}
/* Sidebar */
#sidebar{width:360px;min-width:280px;background:#111b21;display:flex;flex-direction:column;border-right:1px solid #2a3942}
#sidebar-header{background:#202c33;padding:12px 16px;display:flex;align-items:center;gap:12px}
#sidebar-header h1{font-size:18px;font-weight:600;color:#e9edef;flex:1}
#status-dot{width:10px;height:10px;border-radius:50%;background:#ccc;transition:background .3s}
#status-dot.connected{background:#25d366}
#search-box{padding:8px 12px;background:#111b21}
#search-box input{width:100%;padding:9px 12px;background:#202c33;border:none;border-radius:8px;color:#e9edef;font-size:14px;outline:none}
#search-box input::placeholder{color:#8696a0}
#chat-list{flex:1;overflow-y:auto}
#chat-list::-webkit-scrollbar{width:6px}
#chat-list::-webkit-scrollbar-thumb{background:#2a3942;border-radius:3px}
.chat-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid #1f2c33;display:flex;align-items:center;gap:12px;transition:background .15s}
.chat-item:hover,.chat-item.active{background:#2a3942}
.chat-avatar{width:46px;height:46px;border-radius:50%;background:#2a3942;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:#e9edef;flex-shrink:0;background:#00a884;font-size:20px}
.chat-info{flex:1;min-width:0}
.chat-name{font-size:15px;font-weight:500;color:#e9edef;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-preview{font-size:13px;color:#8696a0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.chat-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.chat-time{font-size:12px;color:#8696a0}
.unread-badge{background:#25d366;color:#111b21;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
/* Main chat area */
#main{flex:1;display:flex;flex-direction:column;background:#0b141a}
#chat-header{background:#202c33;padding:12px 16px;display:flex;align-items:center;gap:12px}
#chat-header-avatar{width:40px;height:40px;border-radius:50%;background:#00a884;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:#111}
#chat-header-info h2{font-size:15px;font-weight:600;color:#e9edef}
#chat-header-info p{font-size:12px;color:#8696a0}
#empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#8696a0}
#empty-state svg{opacity:.3}
#empty-state p{font-size:15px}
/* Messages */
#messages-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:4px;background:#0b141a}
#messages-area::-webkit-scrollbar{width:6px}
#messages-area::-webkit-scrollbar-thumb{background:#2a3942;border-radius:3px}
.msg-wrapper{display:flex}
.msg-wrapper.sent{justify-content:flex-end}
.msg-bubble{max-width:65%;padding:8px 12px;border-radius:8px;font-size:14px;line-height:1.4;position:relative;word-wrap:break-word}
.msg-wrapper.received .msg-bubble{background:#202c33;border-top-left-radius:2px;color:#e9edef}
.msg-wrapper.sent .msg-bubble{background:#005c4b;border-top-right-radius:2px;color:#e9edef}
.msg-time{font-size:11px;color:#8696a0;margin-top:3px;text-align:right}
.msg-date-divider{text-align:center;margin:8px 0}
.msg-date-divider span{background:#182229;padding:4px 12px;border-radius:8px;font-size:12px;color:#8696a0}
/* Input area */
#input-area{background:#202c33;padding:12px 16px;display:flex;align-items:center;gap:12px}
#msg-input{flex:1;padding:10px 16px;background:#2a3942;border:none;border-radius:24px;color:#e9edef;font-size:15px;outline:none;resize:none;max-height:120px;overflow-y:auto}
#msg-input::placeholder{color:#8696a0}
#send-btn{width:44px;height:44px;border-radius:50%;background:#00a884;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#111;font-size:20px;transition:background .15s;flex-shrink:0}
#send-btn:hover{background:#06cf9c}
#send-btn:disabled{background:#2a3942;cursor:not-allowed;color:#8696a0}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#202c33;color:#e9edef;padding:10px 20px;border-radius:8px;font-size:14px;display:none;z-index:999;border:1px solid #2a3942}
.no-chats{padding:24px;text-align:center;color:#8696a0;font-size:14px}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <span style="font-size:22px">💬</span>
    <h1>WhatsApp UI</h1>
    <div id="status-dot" title="Connecting..."></div>
  </div>
  <div id="search-box">
    <input type="text" id="search-input" placeholder="Search or start new chat"/>
  </div>
  <div id="chat-list"><div class="no-chats">No chats yet. Send a message to your bot!</div></div>
</div>

<div id="main">
  <div id="empty-state">
    <svg width="80" height="80" viewBox="0 0 24 24" fill="white"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
    <p>Select a chat to start messaging</p>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '';
let activeJid = null;
let allChats = [];
let pollInterval = null;

// Connection status check
async function checkStatus() {
  try {
    const r = await fetch(API + '/api/status');
    const d = await r.json();
    const dot = document.getElementById('status-dot');
    dot.className = d.connected ? 'connected' : '';
    dot.title = d.connected ? 'Connected to WhatsApp' : 'Disconnected';
  } catch(_) {}
}

// Load chat list
async function loadChats() {
  try {
    const r = await fetch(API + '/api/chats');
    allChats = await r.json();
    renderChatList(allChats);
  } catch(_) {}
}

function renderChatList(chats) {
  const el = document.getElementById('chat-list');
  const query = document.getElementById('search-input').value.toLowerCase();
  const filtered = chats.filter(c => !query || (c.name||'').toLowerCase().includes(query) || (c.phone||'').includes(query));
  if (!filtered.length) { el.innerHTML = '<div class="no-chats">No chats found</div>'; return; }
  el.innerHTML = filtered.map(c => {
    const initial = (c.name || c.phone || '?')[0].toUpperCase();
    const time = c.lastTs ? new Date(c.lastTs).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
    const active = c.id === activeJid ? ' active' : '';
    const badge = c.unread > 0 ? '<div class="unread-badge">' + c.unread + '</div>' : '';
    return '<div class="chat-item' + active + '" onclick="openChat(\'' + escHtml(c.id) + '\')">' +
      '<div class="chat-avatar">' + initial + '</div>' +
      '<div class="chat-info"><div class="chat-name">' + escHtml(c.name || c.phone || c.id) + '</div>' +
      '<div class="chat-preview">' + escHtml(c.lastMsg || '') + '</div></div>' +
      '<div class="chat-meta"><div class="chat-time">' + time + '</div>' + badge + '</div></div>';
  }).join('');
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// Open a chat
async function openChat(jid) {
  activeJid = jid;
  const chat = allChats.find(c => c.id === jid) || { id: jid, name: jid.split('@')[0], phone: jid.split('@')[0] };
  renderChatList(allChats);

  const main = document.getElementById('main');
  const initial = (chat.name || chat.phone || '?')[0].toUpperCase();
  main.innerHTML = 
    '<div id="chat-header">' +
      '<div id="chat-header-avatar">' + initial + '</div>' +
      '<div id="chat-header-info"><h2>' + escHtml(chat.name || chat.phone || jid) + '</h2>' +
      '<p>' + escHtml(chat.phone || jid) + '</p></div>' +
    '</div>' +
    '<div id="messages-area"></div>' +
    '<div id="input-area">' +
      '<textarea id="msg-input" placeholder="Type a message" rows="1"></textarea>' +
      '<button id="send-btn" onclick="sendMessage()">&#9658;</button>' +
    '</div>';

  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('msg-input').addEventListener('input', function() {
    this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  await loadMessages(jid);
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(() => loadMessages(jid), 3000);
}

async function loadMessages(jid) {
  if (jid !== activeJid) return;
  try {
    const r = await fetch(API + '/api/chats/' + encodeURIComponent(jid) + '/messages');
    const msgs = await r.json();
    const area = document.getElementById('messages-area');
    if (!area) return;
    const wasBottom = area.scrollHeight - area.clientHeight - area.scrollTop < 60;
    area.innerHTML = msgs.length ? renderMessages(msgs) : '<div style="text-align:center;color:#8696a0;padding:20px;font-size:13px">No messages yet</div>';
    if (wasBottom || msgs.length <= 5) area.scrollTop = area.scrollHeight;
    await loadChats();
  } catch(_) {}
}

function renderMessages(msgs) {
  let html = ''; let lastDate = '';
  msgs.forEach(m => {
    const d = new Date(m.timestamp);
    const dateStr = d.toLocaleDateString([], {weekday:'short',month:'short',day:'numeric'});
    if (dateStr !== lastDate) {
      html += '<div class="msg-date-divider"><span>' + dateStr + '</span></div>';
      lastDate = dateStr;
    }
    const time = d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    const dir = m.fromMe ? 'sent' : 'received';
    html += '<div class="msg-wrapper ' + dir + '"><div class="msg-bubble">' +
      escHtml(m.text || '') + '<div class="msg-time">' + time + '</div></div></div>';
  });
  return html;
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const btn   = document.getElementById('send-btn');
  const text  = input?.value?.trim();
  if (!text || !activeJid) return;
  btn.disabled = true;
  input.value = '';
  input.style.height = 'auto';
  try {
    const r = await fetch(API + '/api/chats/' + encodeURIComponent(activeJid) + '/send', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ text })
    });
    const d = await r.json();
    if (!d.ok) showToast('Error: ' + (d.error || 'Send failed'));
    else await loadMessages(activeJid);
  } catch(e) { showToast('Network error'); }
  finally { btn.disabled = false; input.focus(); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// SSE for real-time updates
function connectSSE() {
  const es = new EventSource(API + '/api/events');
  es.onmessage = async e => {
    const d = JSON.parse(e.data);
    if (d.type === 'message') {
      await loadChats();
      if (activeJid === d.jid) await loadMessages(d.jid);
    }
  };
  es.onerror = () => setTimeout(connectSSE, 5000);
}

// Search
document.getElementById('search-input').addEventListener('input', () => renderChatList(allChats));

// Init
checkStatus();
loadChats();
connectSSE();
setInterval(checkStatus, 10000);
setInterval(loadChats, 5000);
</script>
</body>
</html>
