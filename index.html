<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WhatsApp Bot UI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0b141a;color:#e9edef;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#top-bar{background:#1f2c33;padding:12px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2a3942;flex-shrink:0}
#top-bar h1{font-size:17px;font-weight:600;flex:1}
#conn-status{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;background:#2a3942;color:#8696a0}
#conn-status.connected{background:#00a884;color:#111}
#conn-status.waiting{background:#ffd700;color:#111}
#app{display:flex;flex:1;overflow:hidden}
#sidebar{width:340px;min-width:280px;background:#111b21;display:flex;flex-direction:column;border-right:1px solid #2a3942}
#sidebar-search{padding:8px 12px;background:#111b21;border-bottom:1px solid #2a3942}
#sidebar-search input{width:100%;padding:8px 14px;background:#202c33;border:none;border-radius:8px;color:#e9edef;font-size:14px;outline:none}
#sidebar-search input::placeholder{color:#8696a0}
#chat-list{flex:1;overflow-y:auto}
#chat-list::-webkit-scrollbar{width:5px}
#chat-list::-webkit-scrollbar-thumb{background:#2a3942}
.ci{padding:13px 16px;cursor:pointer;border-bottom:1px solid #1f2c33;display:flex;align-items:center;gap:12px;transition:background .15s}
.ci:hover,.ci.active{background:#2a3942}
.av{width:46px;height:46px;border-radius:50%;background:#00a884;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;color:#111;flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-preview{font-size:13px;color:#8696a0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.ci-meta{text-align:right;flex-shrink:0}
.ci-time{font-size:11px;color:#8696a0}
.badge{background:#25d366;color:#111;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:4px;margin-left:auto}
#main{flex:1;display:flex;flex-direction:column;position:relative}
#qr-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px;text-align:center}
#qr-panel h2{font-size:18px;font-weight:600;color:#e9edef}
#qr-panel p{font-size:14px;color:#8696a0;max-width:400px;line-height:1.5}
#qr-img{border:4px solid #25d366;border-radius:12px;padding:12px;background:white;display:none}
#qr-img img{width:200px;height:200px;display:block}
#connecting-spinner{display:flex;flex-direction:column;align-items:center;gap:12px}
.spinner{width:40px;height:40px;border:3px solid #2a3942;border-top:3px solid #00a884;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#chat-area{flex:1;display:flex;flex-direction:column;display:none}
#chat-hdr{background:#202c33;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2a3942;flex-shrink:0}
#chat-hdr-av{width:40px;height:40px;border-radius:50%;background:#00a884;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#111}
#chat-hdr-info h2{font-size:15px;font-weight:600}
#chat-hdr-info p{font-size:12px;color:#8696a0}
#msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:3px}
#msgs::-webkit-scrollbar{width:5px}
#msgs::-webkit-scrollbar-thumb{background:#2a3942}
.mw{display:flex}
.mw.s{justify-content:flex-end}
.mb{max-width:68%;padding:7px 12px;border-radius:8px;font-size:14px;line-height:1.45;word-wrap:break-word;position:relative}
.mw.r .mb{background:#202c33;border-top-left-radius:2px}
.mw.s .mb{background:#005c4b;border-top-right-radius:2px}
.mt{font-size:11px;color:#8696a080;margin-top:4px;text-align:right}
.dd{text-align:center;margin:6px 0}
.dd span{background:#182229;padding:4px 14px;border-radius:8px;font-size:12px;color:#8696a0}
#inp{background:#202c33;padding:10px 16px;display:flex;align-items:flex-end;gap:10px;flex-shrink:0;border-top:1px solid #2a3942}
#inp textarea{flex:1;padding:10px 14px;background:#2a3942;border:none;border-radius:22px;color:#e9edef;font-size:15px;outline:none;resize:none;max-height:100px;overflow-y:auto;line-height:1.4}
#inp textarea::placeholder{color:#8696a0}
#sb{width:44px;height:44px;border-radius:50%;background:#00a884;border:none;cursor:pointer;color:#111;font-size:22px;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
#sb:hover{background:#06cf9c}
#sb:disabled{background:#2a3942;color:#8696a0;cursor:not-allowed}
#empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#8696a0}
#empty-chat svg{opacity:.2}
.no-chats{padding:20px;text-align:center;color:#8696a0;font-size:13px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2a3942;color:#e9edef;padding:10px 22px;border-radius:8px;font-size:14px;display:none;z-index:9999;border:1px solid #3b4a54;box-shadow:0 4px 12px #0006}
#run-url{font-size:12px;color:#8696a0;word-break:break-all;max-width:440px}
</style>
</head>
<body>
<div id="top-bar">
  <span style="font-size:22px">💬</span>
  <h1>WhatsApp Bot — Live UI</h1>
  <span id="conn-status">Connecting…</span>
</div>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-search">
      <input id="search" type="text" placeholder="Search chats…"/>
    </div>
    <div id="chat-list"><div class="no-chats">Waiting for messages…</div></div>
  </div>

  <div id="main">
    <!-- QR / connecting panel -->
    <div id="qr-panel">
      <div id="connecting-spinner">
        <div class="spinner"></div>
        <h2>Starting bot…</h2>
        <p>GitHub Actions is booting up. This page will update automatically.<br/>
           If a QR code appears below, scan it with WhatsApp to log in.</p>
        <span id="run-url"></span>
      </div>
      <div id="qr-img">
        <img id="qr-image" src="" alt="QR Code"/>
        <p style="margin-top:10px;font-size:13px;color:#333">Scan with WhatsApp → Linked Devices</p>
      </div>
    </div>

    <!-- Chat area (hidden until connected) -->
    <div id="chat-area">
      <div id="chat-hdr">
        <div id="chat-hdr-av">?</div>
        <div id="chat-hdr-info"><h2 id="hdr-name">Chat</h2><p id="hdr-phone"></p></div>
      </div>
      <div id="msgs"></div>
      <div id="inp">
        <textarea id="msg-inp" placeholder="Type a message" rows="1"></textarea>
        <button id="sb" onclick="sendMsg()">&#9658;</button>
      </div>
    </div>

    <!-- Empty state -->
    <div id="empty-chat" style="display:none">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      <p>Select a conversation</p>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const REPO  = 'PranayMahendrakar/whatsapp-baileys-bot';
const RAW   = 'https://raw.githubusercontent.com/' + REPO + '/main/';
let API_URL = null;
let activeJid = null, allChats = [], pollTimer = null, statusTimer = null;

// ── Bootstrap: find the tunnel URL from status.json ────────────────────────
async function bootstrap() {
  setStatus('loading');
  try {
    const r = await fetch(RAW + 'status.json?t=' + Date.now());
    if (!r.ok) { scheduleBootstrap(8000); return; }
    const s = await r.json();

    // Show QR if not yet connected
    if (s.qr) {
      document.getElementById('qr-img').style.display = 'block';
      document.getElementById('qr-image').src = RAW + 'qr.png?t=' + Date.now();
      setStatus('waiting');
      document.querySelector('#connecting-spinner h2').textContent = 'Scan QR code';
    }

    if (s.url) {
      API_URL = s.url;
      document.getElementById('run-url').textContent = 'Bot API: ' + API_URL;
      await checkConnected();
    } else {
      scheduleBootstrap(6000);
    }
  } catch(_) {
    scheduleBootstrap(8000);
  }
}

function scheduleBootstrap(ms) { setTimeout(bootstrap, ms); }

async function checkConnected() {
  if (!API_URL) return;
  try {
    const r = await fetch(API_URL + '/api/status');
    const d = await r.json();
    if (d.connected) {
      setStatus('connected');
      document.getElementById('qr-panel').style.display = 'none';
      document.getElementById('empty-chat').style.display = 'flex';
      startPolling();
    } else {
      setStatus('waiting');
      // Refresh QR
      const sr = await fetch(RAW + 'status.json?t=' + Date.now());
      const s  = await sr.json();
      if (s.qr) {
        document.getElementById('qr-img').style.display = 'block';
        document.getElementById('qr-image').src = RAW + 'qr.png?t=' + Date.now();
        document.querySelector('#connecting-spinner h2').textContent = 'Scan QR to connect';
      }
      setTimeout(checkConnected, 5000);
    }
  } catch(_) {
    setTimeout(checkConnected, 6000);
  }
}

function setStatus(state) {
  const el = document.getElementById('conn-status');
  if (state === 'connected')  { el.textContent = 'Connected'; el.className = 'connected'; }
  else if (state === 'waiting') { el.textContent = 'Waiting for QR scan'; el.className = 'waiting'; }
  else                          { el.textContent = 'Connecting…'; el.className = ''; }
}

// ── Chat polling ────────────────────────────────────────────────────────────
function startPolling() {
  clearInterval(pollTimer);
  loadChats();
  pollTimer = setInterval(loadChats, 4000);
  // Also set up SSE
  setupSSE();
}

function setupSSE() {
  if (!API_URL) return;
  const es = new EventSource(API_URL + '/api/events');
  es.onmessage = async e => {
    const d = JSON.parse(e.data);
    if (d.type === 'message') {
      await loadChats();
      if (activeJid === d.jid) await loadMessages(d.jid);
    }
  };
  es.onerror = () => setTimeout(setupSSE, 5000);
}

async function loadChats() {
  if (!API_URL) return;
  try {
    const r = await fetch(API_URL + '/api/chats');
    allChats = await r.json();
    renderChats();
  } catch(_) {}
}

function renderChats() {
  const q   = document.getElementById('search').value.toLowerCase();
  const el  = document.getElementById('chat-list');
  const filtered = allChats.filter(c => !q || (c.name||'').toLowerCase().includes(q) || (c.phone||'').includes(q));
  if (!filtered.length) { el.innerHTML = '<div class="no-chats">' + (q ? 'No results' : 'No chats yet') + '</div>'; return; }
  el.innerHTML = filtered.map(c => {
    const init  = (c.name || c.phone || '?')[0].toUpperCase();
    const time  = c.lastTs ? new Date(c.lastTs).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
    const badge = c.unread > 0 ? '<div class="badge">' + c.unread + '</div>' : '';
    const act   = c.id === activeJid ? ' active' : '';
    return '<div class="ci' + act + '" onclick="openChat(' + JSON.stringify(c.id) + ')">' +
      '<div class="av">' + esc(init) + '</div>' +
      '<div class="ci-info"><div class="ci-name">' + esc(c.name || c.phone || c.id) + '</div>' +
      '<div class="ci-preview">' + esc(c.lastMsg || '') + '</div></div>' +
      '<div class="ci-meta"><div class="ci-time">' + time + '</div>' + badge + '</div></div>';
  }).join('');
}

async function openChat(jid) {
  activeJid = jid;
  const c = allChats.find(x => x.id === jid) || {id: jid, name: jid.split('@')[0], phone: jid.split('@')[0]};
  renderChats();
  document.getElementById('qr-panel').style.display = 'none';
  document.getElementById('empty-chat').style.display = 'none';
  document.getElementById('chat-area').style.display = 'flex';
  document.getElementById('chat-area').style.flexDirection = 'column';
  document.getElementById('hdr-name').textContent = c.name || c.phone || jid;
  document.getElementById('hdr-phone').textContent = c.phone || jid;
  document.getElementById('chat-hdr-av').textContent = (c.name || c.phone || '?')[0].toUpperCase();
  await loadMessages(jid);
  clearInterval(pollTimer);
  pollTimer = setInterval(() => loadMessages(jid), 3000);
}

async function loadMessages(jid) {
  if (jid !== activeJid || !API_URL) return;
  try {
    const r = await fetch(API_URL + '/api/chats/' + encodeURIComponent(jid) + '/messages');
    const msgs = await r.json();
    const box = document.getElementById('msgs');
    if (!box) return;
    const atBottom = box.scrollHeight - box.clientHeight - box.scrollTop < 60;
    box.innerHTML = msgs.length ? renderMsgs(msgs) : '<div style="text-align:center;padding:20px;color:#8696a0;font-size:13px">No messages</div>';
    if (atBottom || msgs.length <= 5) box.scrollTop = box.scrollHeight;
    loadChats();
  } catch(_) {}
}

function renderMsgs(msgs) {
  let html = '', lastDate = '';
  msgs.forEach(m => {
    const d = new Date(m.timestamp);
    const ds = d.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'});
    if (ds !== lastDate) { html += '<div class="dd"><span>' + ds + '</span></div>'; lastDate = ds; }
    const t = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    html += '<div class="mw ' + (m.fromMe ? 's' : 'r') + '"><div class="mb">' + esc(m.text || '') + '<div class="mt">' + t + '</div></div></div>';
  });
  return html;
}

async function sendMsg() {
  const inp = document.getElementById('msg-inp');
  const btn = document.getElementById('sb');
  const txt = inp.value.trim();
  if (!txt || !activeJid || !API_URL) return;
  btn.disabled = true;
  inp.value = ''; inp.style.height = 'auto';
  try {
    const r = await fetch(API_URL + '/api/chats/' + encodeURIComponent(activeJid) + '/send', {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text: txt})
    });
    const d = await r.json();
    if (d.ok) await loadMessages(activeJid);
    else toast('Error: ' + (d.error || 'Failed'));
  } catch(e) { toast('Network error'); }
  finally { btn.disabled = false; inp.focus(); }
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

document.getElementById('search').addEventListener('input', () => renderChats());
document.getElementById('msg-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
document.getElementById('msg-inp').addEventListener('input', function() {
  this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

// ── Start ──────────────────────────────────────────────────────────────────
bootstrap();
</script>
</body>
</html>
