<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>WhatsApp Bot UI</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0b141a;color:#e9edef;height:100vh;display:flex;flex-direction:column;overflow:hidden}
    #top-bar{background:#1f2c33;padding:12px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2a3942;flex-shrink:0}
    #top-bar h1{font-size:17px;font-weight:600;flex:1}
    #conn-status{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;background:#2a3942;color:#8696a0}
    #conn-status.connected{background:#00a884;color:#111}
    #conn-status.waiting{background:#ffd700;color:#111}
    #app{display:flex;flex:1;overflow:hidden}
    #sidebar{width:340px;min-width:280px;background:#111b21;display:flex;flex-direction:column;border-right:1px solid #2a3942}
    #sidebar-search{padding:8px 12px;background:#111b21;border-bottom:1px solid #2a3942}
    #sidebar-search input{width:100%;padding:8px 14px;background:#202c33;border:none;border-radius:8px;color:#e9edef;font-size:14px;outline:none}
    #sidebar-search input::placeholder{color:#8696a0}
    #chat-list{flex:1;overflow-y:auto}
    #chat-list::-webkit-scrollbar{width:5px}
    #chat-list::-webkit-scrollbar-thumb{background:#2a3942}
    .ci{padding:13px 16px;cursor:pointer;border-bottom:1px solid #1f2c33;display:flex;align-items:center;gap:12px;transition:background .15s}
    .ci:hover,.ci.active{background:#2a3942}
    .av{width:46px;height:46px;border-radius:50%;background:#00a884;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;color:#111;flex-shrink:0}
    .ci-info{flex:1;min-width:0}
    .ci-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ci-preview{font-size:13px;color:#8696a0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .ci-time{font-size:11px;color:#8696a0;flex-shrink:0}
    #main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    #qr-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:40px}
    #qr-screen h2{font-size:22px;color:#e9edef;font-weight:600}
    #qr-screen p{color:#8696a0;text-align:center;max-width:440px;line-height:1.6;font-size:14px}
    #qr-img{width:280px;height:280px;border:4px solid #00a884;border-radius:12px;background:#fff;display:none;image-rendering:pixelated}
    #qr-spinner{width:60px;height:60px;border:4px solid #2a3942;border-top-color:#00a884;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #qr-status{font-size:14px;color:#8696a0;text-align:center;max-width:440px;line-height:1.6}
    #countdown{font-size:13px;color:#ffd700;font-weight:600;margin-top:-8px}
    #chat-header{background:#1f2c33;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #2a3942;flex-shrink:0}
    #chat-header .av{width:40px;height:40px;font-size:16px}
    #chat-title{font-size:16px;font-weight:600}
    #msg-area{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:4px;background:#0b141a}
    #msg-area::-webkit-scrollbar{width:5px}
    #msg-area::-webkit-scrollbar-thumb{background:#2a3942}
    .msg{max-width:65%;padding:8px 12px;border-radius:8px;font-size:14.5px;line-height:1.45;position:relative;word-break:break-word}
    .msg.in{background:#1f2c33;align-self:flex-start;border-top-left-radius:2px}
    .msg.out{background:#005c4b;align-self:flex-end;border-top-right-radius:2px}
    .msg .ts{font-size:11px;color:#8696a0;margin-top:4px;text-align:right}
    #input-bar{background:#1f2c33;padding:10px 16px;display:flex;gap:10px;border-top:1px solid #2a3942;flex-shrink:0}
    #msg-input{flex:1;background:#2a3942;border:none;border-radius:8px;padding:10px 14px;color:#e9edef;font-size:15px;outline:none;resize:none;max-height:120px;overflow-y:auto}
    #msg-input::placeholder{color:#8696a0}
    #send-btn{background:#00a884;border:none;border-radius:8px;padding:10px 20px;color:#fff;font-size:15px;cursor:pointer;font-weight:600;transition:background .15s}
    #send-btn:hover{background:#017561}
    #send-btn:disabled{background:#2a3942;color:#8696a0;cursor:not-allowed}
    .empty-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#8696a0;font-size:15px}
    #refresh-btn{background:#2a3942;border:none;border-radius:8px;padding:8px 16px;color:#e9edef;cursor:pointer;font-size:13px}
    #refresh-btn:hover{background:#374a55}
  </style>
</head>
<body>
  <div id="top-bar">
    <h1>📱 WhatsApp Bot UI</h1>
    <span id="conn-status">⏳ Loading…</span>
    <button id="refresh-btn" onclick="location.reload()">↻ Refresh</button>
  </div>

  <!-- QR Screen -->
  <div id="qr-screen">
    <h2>Scan QR to Connect WhatsApp</h2>
    <div id="qr-spinner"></div>
    <img id="qr-img" alt="QR Code"/>
    <p id="qr-status">⏳ Waiting for bot to start on GitHub Actions…<br>Start the workflow from the Actions tab if needed.</p>
    <div id="countdown"></div>
  </div>

  <!-- Main Chat App (hidden until connected) -->
  <div id="app" style="display:none">
    <div id="sidebar">
      <div id="sidebar-search">
        <input id="search-input" type="text" placeholder="🔍 Search chats" oninput="filterChats(this.value)"/>
      </div>
      <div id="chat-list"></div>
    </div>
    <div id="main">
      <div class="empty-main" id="no-chat-msg">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="#e9edef" style="opacity:.15"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        <span>Select a chat to start messaging</span>
      </div>
      <div id="chat-view" style="display:none;flex-direction:column;flex:1;overflow:hidden">
        <div id="chat-header">
          <div class="av" id="chat-av">?</div>
          <span id="chat-title">Chat</span>
        </div>
        <div id="msg-area"></div>
        <div id="input-bar">
          <textarea id="msg-input" placeholder="Type a message…" rows="1" onkeydown="handleKey(event)"></textarea>
          <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

<script>
const REPO  = 'PranayMahendrakar';
const RNAME = 'whatsapp-baileys-bot';
const RAW   = 'https://raw.githubusercontent.com/' + REPO + '/' + RNAME + '/main';

let tunnelBase = null;
let currentJid = null;
let chats = {};
let qrExpireTimer = null;
let qrCountdown = 30;
let pollTimer = null;
let msgPollTimer = null;

// ── Poll status.json from repo (every 4s) ───────────────────────────────────
async function pollStatus() {
  try {
    const r = await fetch(RAW + '/status.json?t=' + Date.now());
    if (!r.ok) throw new Error('no status.json');
    const s = await r.json();

    if (s.connected && s.url) {
      tunnelBase = s.url;
      showApp();
      return;
    }

    // Show QR if available
    const cs = document.getElementById('conn-status');
    const spin = document.getElementById('qr-spinner');
    const img = document.getElementById('qr-img');

    if (s.qr) {
      // QR is a base64 data URL embedded in status.json
      img.src = s.qr;
      img.style.display = 'block';
      spin.style.display = 'none';
      cs.textContent = '📱 Scan QR code';
      cs.className = 'waiting';
      document.getElementById('qr-status').innerHTML =
        '📱 Scan with WhatsApp → <b>Settings → Linked Devices → Link a Device</b><br>' +
        'QR refreshes automatically when it expires.';
      // Start countdown
      startQrCountdown();
    } else if (s.url) {
      cs.textContent = '⏳ Bot starting…';
      cs.className = '';
      spin.style.display = 'block';
      img.style.display = 'none';
      document.getElementById('qr-status').textContent = '🔄 Bot is running, generating QR code…';
    } else {
      cs.textContent = '⏳ Bot offline';
      cs.className = '';
      spin.style.display = 'block';
      img.style.display = 'none';
      document.getElementById('qr-status').innerHTML =
        '⚠️ Bot is not running.<br>Go to <a href="https://github.com/' + REPO + '/' + RNAME + '/actions" target="_blank" style="color:#00a884">GitHub Actions</a> and click <b>Run workflow</b>.';
    }
  } catch(e) {
    document.getElementById('conn-status').textContent = '⏳ Loading…';
  }
}

function startQrCountdown() {
  if (qrExpireTimer) clearInterval(qrExpireTimer);
  qrCountdown = 30;
  updateCountdown();
  qrExpireTimer = setInterval(() => {
    qrCountdown--;
    updateCountdown();
    if (qrCountdown <= 0) {
      clearInterval(qrExpireTimer);
      qrExpireTimer = null;
      document.getElementById('countdown').textContent = '🔄 Waiting for new QR…';
      document.getElementById('qr-img').style.display = 'none';
      document.getElementById('qr-spinner').style.display = 'block';
    }
  }, 1000);
}

function updateCountdown() {
  const el = document.getElementById('countdown');
  if (qrCountdown > 0) {
    el.textContent = '⏱ Expires in ' + qrCountdown + 's';
  }
}

function showApp() {
  if (qrExpireTimer) clearInterval(qrExpireTimer);
  document.getElementById('qr-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  const cs = document.getElementById('conn-status');
  cs.textContent = '🟢 Connected';
  cs.className = 'connected';
  loadChats();
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(loadChats, 6000);
  // Keep checking if bot disconnects
  setInterval(async () => {
    try {
      const r = await fetch(RAW + '/status.json?t=' + Date.now());
      const s = await r.json();
      if (!s.connected) location.reload();
    } catch(_){}
  }, 15000);
}

// ── API helpers ─────────────────────────────────────────────────────────────
async function api(path, opts) {
  if (!tunnelBase) return null;
  const r = await fetch(tunnelBase + path, {
    headers: {'Content-Type':'application/json'},
    ...opts
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadChats() {
  try {
    const data = await api('/api/chats');
    if (!data) return;
    chats = {};
    data.forEach(c => { chats[c.jid] = c; });
    renderChatList(data);
  } catch(e) { console.error('loadChats:', e); }
}

function renderChatList(list) {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = q ? list.filter(c => (c.name||c.jid).toLowerCase().includes(q)) : list;
  document.getElementById('chat-list').innerHTML = filtered.map(c => {
    const name = c.name || c.jid.split('@')[0];
    const time = c.lastTimestamp ? new Date(c.lastTimestamp*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="ci ${c.jid===currentJid?'active':''}" onclick="openChat('${esc(c.jid)}')">
      <div class="av">${esc(name[0].toUpperCase())}</div>
      <div class="ci-info">
        <div class="ci-name">${esc(name)}</div>
        <div class="ci-preview">${esc(c.lastMessage||'')}</div>
      </div>
      <div class="ci-time">${time}</div>
    </div>`;
  }).join('');
}

function filterChats(q) { renderChatList(Object.values(chats)); }

async function openChat(jid) {
  currentJid = jid;
  const c = chats[jid] || {};
  const name = c.name || jid.split('@')[0];
  document.getElementById('chat-title').textContent = name;
  document.getElementById('chat-av').textContent = name[0].toUpperCase();
  document.getElementById('no-chat-msg').style.display = 'none';
  const cv = document.getElementById('chat-view');
  cv.style.display = 'flex';
  document.getElementById('send-btn').disabled = false;
  renderChatList(Object.values(chats));
  await loadMessages(jid);
  if (msgPollTimer) clearInterval(msgPollTimer);
  msgPollTimer = setInterval(() => loadMessages(jid), 3000);
}

async function loadMessages(jid) {
  try {
    const msgs = await api('/api/chats/' + encodeURIComponent(jid) + '/messages');
    if (!msgs) return;
    const el = document.getElementById('msg-area');
    const atBottom = el.scrollHeight - el.clientHeight <= el.scrollTop + 60;
    el.innerHTML = msgs.map(m => {
      const time = m.timestamp ? new Date(m.timestamp*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
      const sender = !m.fromMe && m.pushName ? `<div style="font-size:12px;color:#00a884;margin-bottom:2px">${esc(m.pushName)}</div>` : '';
      return `<div class="msg ${m.fromMe?'out':'in'}">${sender}${esc(m.text)}<div class="ts">${time}</div></div>`;
    }).join('');
    if (atBottom) el.scrollTop = el.scrollHeight;
  } catch(e) {}
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !currentJid) return;
  input.value = '';
  document.getElementById('send-btn').disabled = true;
  try {
    await api('/api/chats/' + encodeURIComponent(currentJid) + '/send', {
      method: 'POST', body: JSON.stringify({ text })
    });
    await loadMessages(currentJid);
  } catch(e) { alert('Send failed: ' + e.message); }
  finally {
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot: poll status.json every 4s ─────────────────────────────────────────
pollStatus();
setInterval(pollStatus, 4000);
</script>
</body>
</html>
