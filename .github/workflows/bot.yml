name: WhatsApp Baileys Bot + Web UI

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-bot:
    name: Run WhatsApp Bot + Web UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Restore WhatsApp session
        run: |
          mkdir -p auth_info
          if [ -n "${{ secrets.WHATSAPP_AUTH_DATA }}" ]; then
            echo "${{ secrets.WHATSAPP_AUTH_DATA }}" | base64 -d > auth_info.tar.gz
            tar -xzf auth_info.tar.gz -C auth_info/ || true
            echo "Session restored"
          else
            echo "No session - bot will show QR"
          fi

      - name: Install ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update -qq && sudo apt-get install -y ngrok
          if [ -n "${{ secrets.NGROK_AUTH_TOKEN }}" ]; then
            ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          fi

      - name: Start ngrok tunnel
        run: |
          ngrok http 3000 --log=stdout > /tmp/ngrok.log 2>&1 &
          sleep 5
          URL=$(curl -s http://localhost:4040/api/tunnels 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['tunnels'][0]['public_url'])" 2>/dev/null || echo "ngrok not available")
          echo "======================================"
          echo "WEB UI URL: $URL"
          echo "Open this in your browser to see chats"
          echo "======================================"
        continue-on-error: true

      - name: Start WhatsApp Bot + Web UI
        run: npm start
        env:
          LOG_LEVEL: info
          PORT: 3000
        timeout-minutes: 350

      - name: Save session artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: whatsapp-auth-session
          path: auth_info/
          retention-days: 7
          if-no-files-found: warn
